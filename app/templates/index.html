<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Itinerary Planner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      color: #60a5fa;
      margin-bottom: 8px;
      text-align: center;
    }
    p.sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d5e;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      color: #9ca3af;
      font-size: 0.85rem;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      background: #0f0f1a;
      border: 1px solid #2d2d5e;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input:focus, select:focus { border-color: #60a5fa; }
    select option { background: #1a1a2e; }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #2563eb; }
    .result {
      background: #1a1a2e;
      border: 1px solid #2d2d5e;
      border-radius: 16px;
      padding: 32px;
      white-space: pre-wrap;
      line-height: 1.8;
      color: #e5e7eb;
    }
    .result-title {
      color: #60a5fa;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .loading { text-align: center; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✈️ Travel Itinerary Planner</h1>
    <p class="sub">Deployed on AWS via Jenkins + Terraform + Docker</p>

    <div class="card">
      <form method="post" action="/">
        <label>Destination</label>
        <input type="text" name="destination" placeholder="e.g. Paris, Tokyo, Bali" required>

        <label>Number of Days</label>
        <input type="number" name="days" min="1" max="14" placeholder="e.g. 5" required>

        <label>Budget</label>
        <select name="budget">
          <option value="Budget (cheap)">Budget (cheap)</option>
          <option value="Medium">Medium</option>
          <option value="Luxury">Luxury</option>
        </select>

        <label>Travel Style</label>
        <select name="style">
          <option value="Adventure">Adventure</option>
          <option value="Relaxed">Relaxed</option>
          <option value="Cultural">Cultural</option>
          <option value="Food & Nightlife">Food & Nightlife</option>
        </select>

        <button type="submit">Generate Itinerary 🗺️</button>
      </form>
    </div>

    {% if itinerary %}
    <div class="result">
      <div class="result-title">📍 Your Itinerary</div>
      {{ itinerary }}
    </div>
    {% endif %}
  </div>
</body>
</html>
