<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Itinerary Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            color: #58a6ff;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 40px;
        }
        .form-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #58a6ff;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #58a6ff;
            color: #0d1117;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #79c0ff; }
        .result-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #e6edf3;
        }
        .result-title {
            color: #58a6ff;
            font-size: 22px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>✈️ Travel Itinerary Planner</h1>
    <p class="subtitle">AI-powered travel planning with Groq</p>

    <div class="form-card">
        <form method="POST">
            <div class="form-group">
                <label>Destination</label>
                <input type="text" name="destination" placeholder="e.g. Paris, France" required>
            </div>
            <div class="form-group">
                <label>Number of Days</label>
                <input type="number" name="days" min="1" max="30" placeholder="e.g. 5" required>
            </div>
            <div class="form-group">
                <label>Budget</label>
                <select name="budget">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="luxury">Luxury</option>
                </select>
            </div>
            <div class="form-group">
                <label>Travel Style</label>
                <select name="style">
                    <option value="adventure">Adventure</option>
                    <option value="relaxed">Relaxed</option>
                    <option value="cultural">Cultural</option>
                    <option value="food">Food</option>
                </select>
            </div>
            <button type="submit">Generate Itinerary </button>
        </form>
    </div>

    {% if itinerary %}
    <div class="result-card">
        <div class="result-title"> Your Itinerary</div>
        {{ itinerary }}
    </div>
    {% endif %}
</body>
</html>
